spring.cloud.compatibility-verifier.enabled=false
server.port=8082
spring.application.name=user-management-service

# Database
spring.datasource.url=jdbc:mysql://mysql:3306/user_management_db?useUnicode=true&createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka
eureka.client.service-url.defaultZone=http://eureka:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Keycloak
keycloak.realm=myapp2
keycloak.server-url=http://keycloak:8080
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/myapp2/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:6083/realms/myapp2

# RabbitMQ
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Auth Service
auth.service.url=http://auth-service:8081

# WebSocket
spring.websocket.enabled=true

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
