server.port=0
spring.application.name=auth-service

# H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Keycloak
keycloak.server-url=http://localhost:6083
keycloak.admin-username=admin
keycloak.admin-password=admin
keycloak.admin-client-id=admin-cli
keycloak.client-id=angular-app
keycloak.realm=myapp2

# Security - both properties required by SecurityConfig @Value fields.
# jwk-set-uri is used to BUILD the JwtDecoder (NimbusJwtDecoder.withJwkSetUri)
# and does NOT trigger a network call at startup — safe for CI.
# issuer-uri is injected as @Value but only used if the app validates issuer claims.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:6083/realms/myapp2/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:6083/realms/myapp2

# RabbitMQ (mock values - actual connection disabled by test context / mocks)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Feign client URLs - must be set or Feign registration fails at context startup
user.service.url=http://localhost:8082

# Eureka - disabled for tests
eureka.client.enabled=false
eureka.client.fetch-registry=false
eureka.client.register-with-eureka=false

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.protocol=smtps
spring.mail.properties.mail.smtps.auth=true
spring.mail.properties.mail.smtps.ssl.enable=true

spring.cloud.compatibility-verifier.enabled=false



spring.jwt.secret=MyEnglishSchoolPlatformSuperSecureJWTKey2025ThatIs32CharsLong
spring.jwt.expiration=86400000




