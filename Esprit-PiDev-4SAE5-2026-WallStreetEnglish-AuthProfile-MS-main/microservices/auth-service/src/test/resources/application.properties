server.port=8081
spring.application.name=auth-service

# H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Keycloak
keycloak.server-url=http://localhost:6083
keycloak.admin-username=admin
keycloak.admin-password=admin
keycloak.admin-client-id=admin-cli
keycloak.client-id=angular-app
keycloak.realm=myapp2

# Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:6083/realms/myapp2

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Eureka - disabled for tests
eureka.client.enabled=false
eureka.client.fetch-registry=false
eureka.client.register-with-eureka=false

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.protocol=smtps
spring.mail.properties.mail.smtps.auth=true
spring.mail.properties.mail.smtps.ssl.enable=true

spring.cloud.compatibility-verifier.enabled=false